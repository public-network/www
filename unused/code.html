  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const homeLinks = document.querySelectorAll('.link.is-home-documentation, .link.is-home-patron, .link.is-home-initiative');
    let scrollTimeout;
    function disableBodyScroll() {
      document.body.style.overflow = 'hidden';
    }
    function enableBodyScrollWithDelay() {
      clearTimeout(scrollTimeout); // Clear existing timeout
      scrollTimeout = setTimeout(function () {
        document.body.style.overflow = '';
      }, 1250);
    }
	homeLinks.forEach(function (homeLink) {
      homeLink.addEventListener('click', function () {
        enableBodyScrollWithDelay();
      });
    });
    disableBodyScroll();
  });
</script>
  <script>

  const patronComponent = document.querySelector('.patron_component');

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const patronsLink = document.querySelector('.nav_link.is-patrons');
    const initiativesLink = document.querySelector('.nav_link.is-initiatives');
    const documentationLink = document.querySelector('.nav_link.is-documentation');
    function scrollToTopAndRemoveSlug() {
      history.replaceState(null, document.title, window.location.pathname);
      window.scrollTo({ top: 0, behavior: 'auto' });
    }
    function addClickHandler(link) {
      if (link) {
        link.addEventListener('click', function (event) {
          event.preventDefault();
          scrollToTopAndRemoveSlug();
        });
      }
    }
    addClickHandler(patronsLink);
    addClickHandler(initiativesLink);
    addClickHandler(documentationLink);
  });
</script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const sectionLinks = document.querySelectorAll('.link.is-home-documentation');
    sectionLinks.forEach(link => {
      link.addEventListener('click', function (event) {
        event.preventDefault();
        const targetSectionId = this.getAttribute('href').substring(1);
        const targetSection = document.getElementById(targetSectionId);
        if (targetSection) {
          window.location.hash = targetSectionId;
        }
      });
    });
  });
</script>
